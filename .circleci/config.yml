version: 2.1

workflows:
  version: 2
  build:
    jobs:
      - build:
          filters:
            branches:
              only:
                - main
      - deploy:
          filters:
            branches:
              only:
                - main
          requires:
            - build

jobs:
  build:
    working_directory: ~/project
    docker:
      - image: circleci/node:10.16.3
    steps:
      - checkout:
          path: ~/project

      - run:
          name: switch to https
          command: git remote set-url origin https://github.com/ADNCI/ExampleApplication.git

      - run:
          name: debug-list-files
          command: |
            pwd
            ls -R

      - run:
          name: update-npm
          command: sudo npm install -g npm@5

      - restore_cache:
          key: dependency-cache-{{ checksum "package-lock.json" }}

      - run:
          name: install-npm
          command: npm install

      - run:
          name: test-run
          command: npm run test

      - save_cache:
          key: dependency-cache-{{ checksum "package-lock.json" }}
          paths:
            - ./node_modules

    deploy:
      docker:
        - image: circleci/node:latest
      steps:
        - run:
            name: Deploy Application
            command: ssh -0 StrictHostKeyChecking=no $EC2_USERNAME@$EC@_PUBLIC_DNS "rm -rf ExampleApplication/;git clone https://github.com/sandydevopssec/ExampleApplication.git; source
            ExampleApplication/deploy.sh"

